# Identifiants SonarCloud
sonar.projectKey=Ezra12363_smart-maintenance
sonar.organization=ezra12363
sonar.projectName=smart-maintenance
sonar.projectVersion=2.0.0

# Sources à analyser
sonar.sources=src
sonar.tests=src/__tests__

# Rapports de couverture
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js
sonar.test.exclusions=**/__tests__/**

# Encoding et règles
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
sonar.javascript.maxLinesPerFunction=30
